<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME - Mensajes</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link rel="stylesheet" href="../styles/styles.css">
    <style>
        .success-message {
            display: none;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
        }

        #send-checkbox:checked~.success-message {
            display: block;
        }

        #send-checkbox {
            display: none;
        }
    </style>
</head>

<body>
    <div class="header-container">
        <div class="header">
            <div class="brand">
                <div class="company">ACME S.A.S</div>
                <div class="subtitle">Sistema de inventarios</div>
            </div>
            <div class="user-actions">
                <a href="../rol/notificaciones.html" class="icon-link">🔔</a>
                <a href="../rol/mensajes.html" class="icon-link">✉️</a>
                <div class="user-menu">
                    <span class="user-info">👤 Admin ▼</span>
                    <div class="dropdown">
                        <a href="../rol/informacion.html">Información</a>
                        <a href="../rol/restablecer.html">Restablecer contraseña</a>
                        <a href="../login.html">Salir</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="nav-container">
        <div class="nav">
            <a href="../index.html">Inicio</a>
            <a href="../productos/productos.html">Productos</a>
            <a href="../ordenes/ordenes.html">Ordenes</a>
            <a href="../cotizaciones/cotizaciones.html">Cotizaciones</a>
            <a href="../compras/compras.html">Compras</a>
            <a href="../clientes/clientes.html">Clientes</a>
            <a href="../proveedores/proveedores.html">Proveedores</a>
            <a href="../reportes/reportes.html">Reportes</a>
            <a href="../usuarios/usuarios.html">Usuarios</a>
        </div>
    </div>
    <div class="main-container">
        <div class="main">
            <h2>Mensajes</h2>
            <div class="message-form">
                <div class="form-group">
                    <label>Para:</label>
                    <input type="text" placeholder="Destinatario">
                </div>
                <div class="form-group">
                    <label>Asunto:</label>
                    <input type="text" placeholder="Asunto">
                </div>
                <div class="form-group">
                    <label>Mensaje:</label>
                    <textarea rows="5" placeholder="Escribir su mensaje aquí ..."></textarea>
                </div>
                <div class="form-actions">
                    <input type="checkbox" id="send-checkbox">
                    <label for="send-checkbox" class="btn">Enviar</label>
                    <div class="success-message">
                        ✅ ¡Enviado con éxito!
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer-container">
        <div class="footer">
            &copy; 2026 COMERCIALIZADORA ACME S.A.S.
        </div>
    </div>
</body>

</html>
