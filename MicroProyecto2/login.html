<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - ACME S.A.S</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <header class="Letrero">
                <h1 class="Titulo">ACME S.A.S</h1>
                <p class="Descripcion">Sistema de Inventario</p>
            </header>

            <form class="Credenciales-container" method="get">
                <label for="documento">Número de Documento:</label>
                <input type="text" id="documento" name="documento" placeholder="Ingrese su documento" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
                <div style="display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap;">
                    <button type="submit" formaction="index.html" class="Ingresar" style="flex:1 1 180px;">
                        INGRESAR COMO ADMIN
                    </button>
                    <button type="submit" formaction="OPERADOR/index.html" class="Ingresar" style="flex:1 1 180px;">
                        INGRESAR COMO OPERADOR
                    </button>
                </div>
            </form>
            <div class="Olvide">
                <a href="olvide_contraseña/correo.html">Olvidé mi contraseña</a>
            </div>
        </div>
    </div>
</body>

</html>
